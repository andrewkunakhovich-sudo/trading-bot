<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude Bot — Live Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; color: #d1d5db; font-family: 'Segoe UI', sans-serif; padding: 24px; }
  h1 { color: #fff; font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 12px; margin-bottom: 28px; }
  .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 18px; }
  .card-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .card-value { font-size: 26px; font-weight: 700; color: #fff; }
  .card-value.green { color: #10b981; }
  .card-value.red { color: #ef4444; }
  .card-value.yellow { color: #f59e0b; }
  .section { margin-bottom: 28px; }
  .section-title { color: #9ca3af; font-size: 12px; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; }
  .section-title .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
  .tag.crypto { background: #1e3a5f; color: #60a5fa; }
  .tag.stocks { background: #1a3a2a; color: #34d399; }
  table { width: 100%; border-collapse: collapse; background: #1a1d27; border-radius: 10px; overflow: hidden; border: 1px solid #2d3148; }
  th { background: #12141e; color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 16px; text-align: left; }
  td { padding: 11px 16px; font-size: 13px; border-top: 1px solid #2d3148; }
  tr:hover td { background: #1f2235; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge.paper { background: #1e3a5f; color: #60a5fa; }
  .badge.paper-short { background: #3a1e2a; color: #f472b6; }
  .badge.paper-stock { background: #1a3a2a; color: #34d399; }
  .badge.blocked { background: #2d1f1f; color: #6b7280; }
  .badge.long { background: #1a3a2a; color: #34d399; }
  .badge.short { background: #3a1e2a; color: #f472b6; }
  .up { color: #10b981; font-weight: 600; }
  .down { color: #ef4444; font-weight: 600; }
  .neutral { color: #6b7280; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .footer { color: #4b5563; font-size: 12px; margin-top: 20px; }
  .coin-icon { font-size: 16px; margin-right: 6px; }
  .pos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 12px; }
  .pos-card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; overflow: hidden; transition: border-color 0.3s; }
  .pos-card-header { padding: 14px 16px 8px; display: flex; justify-content: space-between; align-items: center; }
  .pos-card-body { padding: 0 0 0 0; }
  .pos-card-stats { padding: 10px 16px 14px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px 16px; border-top: 1px solid #2d3148; }
  .pos-stat-label { font-size: 10px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.04em; }
  .pos-stat-value { font-size: 13px; font-weight: 600; color: #fff; margin-top: 2px; }
</style>
</head>
<body>
<h1><span class="dot"></span>Claude Trading Bot</h1>
<p class="subtitle">Paper trading · Crypto + Stocks · Updates every 15 seconds</p>

<div id="morning-report" class="section"></div>
<div id="stats" class="grid"></div>
<div id="equity" class="section"></div>
<div id="crypto-positions" class="section"></div>
<div id="stock-positions" class="section"></div>
<div id="closed-trades" class="section"></div>
<div id="daily-history" class="section"></div>
<div id="perf-symbol" class="section"></div>
<div id="perf-hour" class="section"></div>
<div id="ai-insights" class="section"></div>
<div id="log" class="section"></div>
<p class="footer" id="footer"></p>

<script>
window.onerror = (msg, src, line, col, err) => {
  document.body.style.padding = '24px';
  document.body.innerHTML = `<div style="background:#1a0000;color:#ef4444;padding:20px;border-radius:8px;font-family:monospace;white-space:pre-wrap;font-size:13px">JS ERROR (line ${line}:${col})\n${msg}\n\n${err?.stack || ''}</div>`;
};
const COIN_ICONS = { BTC:'₿', ETH:'Ξ', SOL:'◎', XRP:'✕', ADA:'₳', DOGE:'Ð', DOT:'●', LINK:'⬡', AVAX:'▲', UNI:'🦄', LTC:'Ł' };
const STOCK_ICONS = { AAPL:'🍎', TSLA:'⚡', NVDA:'🟢', MSFT:'🪟', AMZN:'📦', META:'🔵', GOOGL:'🔍', NFLX:'🎬', SPY:'📊' };
const CRYPTO_SUFFIXES = ['USDT','USD','BTC','ETH'];

function isCrypto(symbol) {
  return CRYPTO_SUFFIXES.some(s => symbol.endsWith(s)) || symbol.length > 5;
}

async function getCryptoPrice(symbol) {
  try {
    const krakenSymbol = symbol.replace('USDT','USD').replace('BTC','XBT');
    const r = await fetch(`https://api.kraken.com/0/public/Ticker?pair=${krakenSymbol}`);
    const d = await r.json();
    if (d.error && d.error.length) return null;
    const key = Object.keys(d.result)[0];
    return parseFloat(d.result[key].c[0]);
  } catch { return null; }
}

function coinIcon(symbol) {
  const coin = symbol.replace('USDT','').replace('USD','');
  return COIN_ICONS[coin] || '●';
}

function stockIcon(ticker) {
  return STOCK_ICONS[ticker] || '📈';
}

async function loadMorningReport() {
  try {
    const r = await fetch('morning-report.json?' + Date.now());
    if (!r.ok) { document.getElementById('morning-report').innerHTML = ''; return; }
    const report = await r.json();
    const sentimentColor = report.marketSentiment === 'bullish' ? '#10b981' : report.marketSentiment === 'bearish' ? '#ef4444' : '#f59e0b';
    const sentimentIcon = report.marketSentiment === 'bullish' ? '📈' : report.marketSentiment === 'bearish' ? '📉' : '➖';
    const headlines = (report.topHeadlines || []).map(h => `<li style="margin-bottom:4px;color:#9ca3af">${h}</li>`).join('');
    const pnlColor = report.yesterdayPnl >= 0 ? '#10b981' : '#ef4444';
    document.getElementById('morning-report').innerHTML = `
      <div class="section-title">☀️ Morning Report — ${report.date}</div>
      <div style="background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div>
          <div style="font-size:12px;color:#6b7280;margin-bottom:8px">MARKET SENTIMENT</div>
          <div style="font-size:22px;font-weight:700;color:${sentimentColor}">${sentimentIcon} ${report.marketSentiment.toUpperCase()}</div>
          <div style="margin-top:16px;font-size:12px;color:#6b7280;margin-bottom:8px">YESTERDAY P&L</div>
          <div style="font-size:20px;font-weight:700;color:${pnlColor}">${report.yesterdayPnl >= 0 ? '+' : ''}$${report.yesterdayPnl.toFixed(2)}</div>
          <div style="margin-top:16px;font-size:12px;color:#6b7280;margin-bottom:4px">OVERNIGHT TRADES: ${report.overnightTrades} &nbsp;|&nbsp; OPEN POSITIONS: ${report.openPositions}</div>
          ${report.bestSymbol ? `<div style="margin-top:8px;font-size:12px;color:#6b7280">Best: <span style="color:#10b981">${report.bestSymbol.symbol} +$${report.bestSymbol.pnl.toFixed(2)}</span></div>` : ''}
          ${report.worstSymbol ? `<div style="font-size:12px;color:#6b7280">Worst: <span style="color:#ef4444">${report.worstSymbol.symbol} $${report.worstSymbol.pnl.toFixed(2)}</span></div>` : ''}
        </div>
        <div>
          <div style="font-size:12px;color:#6b7280;margin-bottom:8px">TOP HEADLINES (LAST 8H)</div>
          <ul style="list-style:none;padding:0;font-size:12px">${headlines || '<li style="color:#6b7280">No headlines found</li>'}</ul>
        </div>
      </div>`;
  } catch { document.getElementById('morning-report').innerHTML = ''; }
}

function drawMiniChart(symbol, closes, entryPrice, trailStop, isLong) {
  if (!closes || closes.length < 2) return '<div style="height:90px;display:flex;align-items:center;justify-content:center;color:#4b5563;font-size:12px">No chart data</div>';
  const W = 500, H = 90, rPad = 48;
  const currentPrice = closes[closes.length - 1];
  const inProfit = isLong ? currentPrice >= entryPrice : currentPrice <= entryPrice;
  const lineColor = inProfit ? '#10b981' : '#ef4444';
  const allP = [...closes, entryPrice, trailStop].filter(Boolean);
  const spread = (Math.max(...allP) - Math.min(...allP)) * 0.3 || entryPrice * 0.002;
  const min = Math.min(...allP) - spread, max = Math.max(...allP) + spread;
  const range = max - min;
  const toX = i => Math.round((i / (closes.length - 1)) * (W - rPad));
  const toY = v => Math.round(H - ((v - min) / range) * H);
  const lastX = toX(closes.length - 1);
  const entryY = toY(entryPrice);
  const linePath = closes.map((v, i) => `${i===0?'M':'L'}${toX(i)},${toY(v)}`).join(' ');
  const areaPath = `M0,${entryY} ` + closes.map((v, i) => `L${toX(i)},${toY(v)}`).join(' ') + ` L${lastX},${entryY} Z`;
  const currentY = toY(currentPrice);
  const stopY = trailStop ? toY(trailStop) : null;
  const pnlPct = isLong ? (currentPrice - entryPrice) / entryPrice * 100 : (entryPrice - currentPrice) / entryPrice * 100;
  const safeSym = symbol.replace(/[^a-zA-Z0-9]/g, '');
  const clamp = (y, lo=8, hi=H-8) => Math.max(lo, Math.min(hi, y));
  return `<svg viewBox="0 0 ${W} ${H}" style="width:100%;height:90px;display:block" preserveAspectRatio="none">
    <defs><linearGradient id="g${safeSym}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${lineColor}" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="${lineColor}" stop-opacity="0.02"/>
    </linearGradient></defs>
    <path d="${areaPath}" fill="url(#g${safeSym})"/>
    ${stopY!==null?`<line x1="0" y1="${stopY}" x2="${lastX}" y2="${stopY}" stroke="#ef4444" stroke-width="1" stroke-dasharray="3 3" opacity="0.7"/>
    <text x="${lastX+4}" y="${clamp(stopY+4)}" fill="#ef4444" font-size="9" font-family="monospace">SL</text>`:''}
    <line x1="0" y1="${entryY}" x2="${lastX}" y2="${entryY}" stroke="#f59e0b" stroke-width="1" stroke-dasharray="4 3" opacity="0.85"/>
    <text x="${lastX+4}" y="${clamp(entryY+4)}" fill="#f59e0b" font-size="9" font-family="monospace">IN</text>
    <path d="${linePath}" fill="none" stroke="${lineColor}" stroke-width="1.5"/>
    <circle cx="${lastX}" cy="${currentY}" r="3" fill="${lineColor}"/>
    <text x="${lastX+4}" y="${clamp(currentY+4)}" fill="${lineColor}" font-size="9" font-family="monospace" font-weight="bold">${pnlPct>=0?'+':''}${pnlPct.toFixed(2)}%</text>
  </svg>`;
}

async function renderPositionCard(pos, priceMap) {
  const isStock = !isCrypto(pos.symbol);
  const isShort = pos.side === 'sell';
  const currentPrice = priceMap[pos.symbol];
  const pnl = currentPrice ? (isShort ? (pos.entryPrice - currentPrice) : (currentPrice - pos.entryPrice)) * pos.quantity : null;
  const pnlPct = pnl !== null ? pnl / pos.sizeUSD * 100 : null;
  const pnlClass = pnl === null ? 'neutral' : pnl >= 0 ? 'up' : 'down';
  const pnlStr = pnl === null ? '—' : `${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}`;
  const pnlPctStr = pnlPct !== null ? ` (${pnlPct >= 0 ? '+' : ''}${pnlPct.toFixed(2)}%)` : '';
  const trailLevel = isShort ? pos.lowestPrice : pos.highestPrice;
  const trailPct = pos.halfTaken ? 0.003 : 0.006;
  const trailStop = trailLevel ? (isShort ? trailLevel * (1 + trailPct) : trailLevel * (1 - trailPct)) : null;
  const dirBadge = isShort ? `<span class="badge short">SHORT</span>` : `<span class="badge long">LONG</span>`;
  const icon = isStock ? stockIcon(pos.symbol) : coinIcon(pos.symbol);
  const label = isStock ? pos.symbol : pos.symbol.replace('USDT', '');
  const sinceMin = pos.entryTime ? Math.round((Date.now() - new Date(pos.entryTime)) / 60000) : null;
  const borderColor = pnl === null ? '#2d3148' : pnl >= 0 ? '#10b98144' : '#ef444444';

  let chartHtml = '';
  if (!isStock) {
    try {
      const instId = pos.symbol.replace('USDT', '-USDT');
      const r = await fetch(`https://www.okx.com/api/v5/market/candles?instId=${instId}&bar=1m&limit=60`);
      const d = await r.json();
      if (d.code === '0' && d.data?.length > 0) {
        const closes = d.data.slice().reverse().map(k => parseFloat(k[4]));
        chartHtml = drawMiniChart(pos.symbol, closes, pos.entryPrice, trailStop, !isShort);
      }
    } catch {}
  }
  if (!chartHtml) {
    const pts = currentPrice ? [pos.entryPrice, currentPrice] : [pos.entryPrice];
    chartHtml = drawMiniChart(pos.symbol, pts, pos.entryPrice, trailStop, !isShort);
  }

  const statusBit = pos.breakevenSet ? '<span style="color:#f59e0b;font-size:11px">🔒 BE set</span>' : pos.halfTaken ? '<span style="color:#10b981;font-size:11px">½ taken</span>' : '';

  return `<div class="pos-card" style="border-color:${borderColor}">
    <div class="pos-card-header">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="coin-icon">${icon}</span>
        <strong style="font-size:15px">${label}</strong>
        ${dirBadge}
        ${sinceMin !== null ? `<span style="color:#6b7280;font-size:11px">${sinceMin}m</span>` : ''}
        ${statusBit}
      </div>
      <div class="${pnlClass}" style="font-size:17px;font-weight:700">${pnlStr}<span style="font-size:11px;font-weight:400">${pnlPctStr}</span></div>
    </div>
    <div class="pos-card-body">${chartHtml}</div>
    <div class="pos-card-stats">
      <div><div class="pos-stat-label">Entry</div><div class="pos-stat-value">$${pos.entryPrice.toFixed(4)}</div></div>
      <div><div class="pos-stat-label">Now</div><div class="pos-stat-value">${currentPrice ? '$'+currentPrice.toFixed(4) : '—'}</div></div>
      <div><div class="pos-stat-label">Trail Stop</div><div class="pos-stat-value" style="color:#ef4444">${trailStop ? '$'+trailStop.toFixed(4) : '—'}</div></div>
      <div><div class="pos-stat-label">Size</div><div class="pos-stat-value">$${pos.sizeUSD.toFixed(0)}</div></div>
      <div><div class="pos-stat-label">Peak</div><div class="pos-stat-value">${trailLevel ? '$'+trailLevel.toFixed(4) : '—'}</div></div>
      <div><div class="pos-stat-label">Type</div><div class="pos-stat-value" style="color:#6b7280">${isStock ? 'Stock' : 'Crypto'}</div></div>
    </div>
  </div>`;
}

async function load() {
  try {
    const r = await fetch('trades-data.json?' + Date.now());
    if (!r.ok) {
      document.getElementById('stats').innerHTML = `<div class="card" style="grid-column:1/-1;text-align:center"><div class="card-label">Status</div><div class="card-value yellow" style="font-size:15px">Bot starting up — waiting for first cycle...</div></div>`;
      document.getElementById('footer').textContent = `Checked: ${new Date().toLocaleTimeString()} · Retrying in 15s`;
      return;
    }
    const raw = await r.json();
    const trades = Array.isArray(raw) ? raw : (raw.trades || []);
    const openPositions = raw.openPositions || [];
    const serverStats = raw.stats || {};
    const botPrices = raw.lastKnownPrices || {};
    const executed = trades.filter(t => t.orderPlaced);
    const today = new Date().toISOString().slice(0,10);
    const todayTrades = executed.filter(t => t.timestamp.startsWith(today));

    // Build open positions from positions.json data
    const cryptoOpen = openPositions.filter(p => isCrypto(p.symbol));
    const stockOpen = openPositions.filter(p => !isCrypto(p.symbol));

    // Use bot's last known prices (no CORS issues), live-refresh crypto only
    const cryptoSymbols = [...new Set(cryptoOpen.map(p => p.symbol))];
    const cryptoPrices = await Promise.all(cryptoSymbols.map(s => getCryptoPrice(s)));

    const priceMap = { ...botPrices };
    cryptoSymbols.forEach((s, i) => { if (cryptoPrices[i]) priceMap[s] = cryptoPrices[i]; });

    // Unrealised P&L on open positions
    let totalPnl = 0, totalInvested = 0;
    openPositions.forEach(pos => {
      const currentPrice = priceMap[pos.symbol];
      if (currentPrice) totalPnl += (currentPrice - pos.entryPrice) * pos.quantity;
      totalInvested += pos.sizeUSD;
    });

    const todayPnl = serverStats.todayPnl || 0;
    const maxDrawdown = serverStats.maxDrawdown || 0;
    const sharpe = serverStats.sharpe;
    const bySymbol = serverStats.bySymbol || {};
    const byHour = serverStats.byHour || {};

    // Win rate from bySymbol totals
    const totalTrades = Object.values(bySymbol).reduce((s, v) => s + v.trades, 0);
    const totalWins = Object.values(bySymbol).reduce((s, v) => s + v.wins, 0);
    const winRate = totalTrades > 0 ? Math.round(totalWins / totalTrades * 100) : null;

    // All-time P&L from daily history
    const dailyPnl = serverStats.dailyPnl || {};
    const days = Object.keys(dailyPnl).sort();
    const allTimePnl = days.reduce((sum, d) => sum + (dailyPnl[d].total || 0), 0);
    const tradingDays = days.length;

    // Extra stats from closed trades
    const allClosed = raw.closedTrades || [];
    const totalClosedTrades = allClosed.length;
    const bestTrade = allClosed.reduce((best, t) => t.pnlUSD > (best?.pnlUSD || -Infinity) ? t : best, null);
    const worstTrade = allClosed.reduce((worst, t) => t.pnlUSD < (worst?.pnlUSD || Infinity) ? t : worst, null);
    const avgWin = totalWins > 0 ? allClosed.filter(t => t.pnlUSD > 0).reduce((s, t) => s + t.pnlUSD, 0) / totalWins : null;
    const totalLosses = totalClosedTrades - totalWins;
    const avgLoss = totalLosses > 0 ? allClosed.filter(t => t.pnlUSD <= 0).reduce((s, t) => s + t.pnlUSD, 0) / totalLosses : null;

    // Stats cards
    document.getElementById('stats').innerHTML = `
      <div class="card">
        <div class="card-label">All-Time P&L</div>
        <div class="card-value ${allTimePnl >= 0 ? 'green' : 'red'}">${allTimePnl >= 0 ? '+' : ''}$${allTimePnl.toFixed(2)}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:4px">${tradingDays} day${tradingDays !== 1 ? 's' : ''} · ${totalClosedTrades} closed trades</div>
      </div>
      <div class="card">
        <div class="card-label">Today's Realised P&L</div>
        <div class="card-value ${todayPnl >= 0 ? 'green' : 'red'}">${todayPnl >= 0 ? '+' : ''}$${todayPnl.toFixed(2)}</div>
      </div>
      <div class="card">
        <div class="card-label">Unrealised P&L</div>
        <div class="card-value ${totalPnl >= 0 ? 'green' : 'red'}">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}</div>
      </div>
      <div class="card">
        <div class="card-label">Win Rate</div>
        <div class="card-value ${winRate >= 50 ? 'green' : winRate !== null ? 'red' : ''}">${winRate !== null ? winRate + '%' : '—'}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:4px">${totalWins}W / ${totalLosses}L</div>
      </div>
      <div class="card">
        <div class="card-label">Best Trade</div>
        <div class="card-value green">${bestTrade ? '+$' + bestTrade.pnlUSD.toFixed(2) : '—'}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:4px">${bestTrade ? bestTrade.symbol?.replace('USDT','') : ''}</div>
      </div>
      <div class="card">
        <div class="card-label">Worst Trade</div>
        <div class="card-value red">${worstTrade ? '$' + worstTrade.pnlUSD.toFixed(2) : '—'}</div>
        <div style="font-size:11px;color:#6b7280;margin-top:4px">${worstTrade ? worstTrade.symbol?.replace('USDT','') : ''}</div>
      </div>
      <div class="card">
        <div class="card-label">Avg Win / Avg Loss</div>
        <div style="display:flex;gap:8px;align-items:baseline;margin-top:6px">
          <span style="font-size:20px;font-weight:700;color:#10b981">${avgWin !== null ? '+$' + avgWin.toFixed(2) : '—'}</span>
          <span style="font-size:13px;color:#6b7280">/</span>
          <span style="font-size:20px;font-weight:700;color:#ef4444">${avgLoss !== null ? '$' + avgLoss.toFixed(2) : '—'}</span>
        </div>
      </div>
      <div class="card">
        <div class="card-label">Max Drawdown</div>
        <div class="card-value red">${maxDrawdown > 0 ? '-$' + maxDrawdown.toFixed(2) : '—'}</div>
      </div>
      <div class="card">
        <div class="card-label">Open Positions</div>
        <div class="card-value yellow">${openPositions.length}</div>
      </div>
    `;

    // All-time equity curve
    if (days.length >= 1) {
      let running = 0;
      const points = [{ d: 'start', v: 0 }, ...days.map(d => {
        running += (dailyPnl[d].total || 0);
        return { d, v: running };
      })];
      const W = 800, H = 120, PAD = 8;
      const vals = points.map(p => p.v);
      const min = Math.min(0, ...vals);
      const max = Math.max(0, ...vals);
      const range = max - min || 1;
      const toX = i => PAD + Math.round(((i) / (points.length - 1)) * (W - PAD * 2));
      const toY = v => PAD + Math.round((1 - (v - min) / range) * (H - PAD * 2));
      const zeroY = toY(0);
      const linePath = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${toX(i)},${toY(p.v)}`).join(' ');
      const fillPath = `${linePath} L${toX(points.length-1)},${zeroY} L${toX(0)},${zeroY} Z`;
      const lastVal = points[points.length - 1].v;
      const lineColor = lastVal >= 0 ? '#10b981' : '#ef4444';
      const fillColor = lastVal >= 0 ? 'rgba(16,185,129,0.12)' : 'rgba(239,68,68,0.12)';
      const firstDate = days[0] || '';
      const lastDate = days[days.length - 1] || '';
      document.getElementById('equity').innerHTML = `
        <div class="section-title" style="display:flex;justify-content:space-between;align-items:center">
          <span>All-Time Equity Curve <span style="color:#6b7280;font-weight:400;text-transform:none;font-size:11px">${tradingDays} day${tradingDays !== 1 ? 's' : ''} trading</span></span>
          <span style="font-size:15px;font-weight:700;color:${lineColor}">${lastVal >= 0 ? '+' : ''}$${lastVal.toFixed(2)}</span>
        </div>
        <div style="background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:12px 16px 8px">
          <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">
            <line x1="${PAD}" y1="${zeroY}" x2="${W-PAD}" y2="${zeroY}" stroke="#2d3148" stroke-width="1" stroke-dasharray="4"/>
            <path d="${fillPath}" fill="${fillColor}"/>
            <path d="${linePath}" fill="none" stroke="${lineColor}" stroke-width="2.5" stroke-linejoin="round"/>
            <circle cx="${toX(points.length-1)}" cy="${toY(lastVal)}" r="4" fill="${lineColor}"/>
          </svg>
          <div style="display:flex;justify-content:space-between;font-size:11px;color:#4b5563;margin-top:2px;padding:0 ${PAD}px">
            <span>${firstDate}</span><span>Today</span>
          </div>
        </div>`;
    } else {
      document.getElementById('equity').innerHTML = '';
    }

    // Daily P&L history table
    if (days.length > 0) {
      let runningTotal = 0;
      const dayRows = [...days].reverse().map(d => {
        const day = dailyPnl[d];
        const pnl = day.total || 0;
        runningTotal += pnl;
        const trades = Object.values(day.bySymbol || {}).reduce((s, v) => s + v.trades, 0);
        const wins = Object.values(day.bySymbol || {}).reduce((s, v) => s + v.wins, 0);
        const wr = trades > 0 ? Math.round(wins / trades * 100) : null;
        return `<tr>
          <td style="color:#9ca3af">${d}</td>
          <td class="${pnl >= 0 ? 'up' : 'down'}">${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)}</td>
          <td style="color:#6b7280">${trades}</td>
          <td style="color:#6b7280">${wr !== null ? wr + '%' : '—'}</td>
          <td style="color:${runningTotal >= 0 ? '#10b981' : '#ef4444'};font-weight:600">${runningTotal >= 0 ? '+' : ''}$${runningTotal.toFixed(2)}</td>
        </tr>`;
      }).join('');
      document.getElementById('daily-history').innerHTML = `
        <div class="section-title">Daily P&L History</div>
        <table>
          <thead><tr><th>Date</th><th>Day P&L</th><th>Trades</th><th>Win Rate</th><th>Running Total</th></tr></thead>
          <tbody>${dayRows}</tbody>
        </table>`;
    } else {
      document.getElementById('daily-history').innerHTML = '';
    }

    // Open position cards with live charts
    const posCards = await Promise.all(openPositions.map(pos => renderPositionCard(pos, priceMap)));
    document.getElementById('crypto-positions').innerHTML = openPositions.length > 0
      ? `<div class="section-title">Open Positions <span class="tag crypto">LIVE CHARTS</span></div><div class="pos-grid">${posCards.join('')}</div>`
      : `<div class="section-title">Open Positions</div><div style="background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:24px;text-align:center;color:#6b7280">No open positions — bot is scanning for setups</div>`;
    document.getElementById('stock-positions').innerHTML = '';

    // Closed trades
    const closedTrades = (raw.closedTrades || []).slice().reverse();
    if (closedTrades.length > 0) {
      const closedRows = closedTrades.slice(0, 20).map(t => {
        const isShort = t.side === "short";
        const dirBadge = isShort
          ? `<span class="badge short">SHORT</span>`
          : `<span class="badge long">LONG</span>`;
        const pnlClass = t.pnlUSD >= 0 ? 'up' : 'down';
        return `<tr>
          <td style="color:#6b7280">${t.time?.slice(0,16).replace('T',' ') || '—'}</td>
          <td><strong>${t.symbol?.replace('USDT','') || '—'}</strong> ${dirBadge}</td>
          <td>$${t.entryPrice?.toFixed(2) || '—'}</td>
          <td>$${t.exitPrice?.toFixed(2) || '—'}</td>
          <td class="${pnlClass}">${t.pnlUSD >= 0 ? '+' : ''}$${t.pnlUSD?.toFixed(2) || '—'} (${t.pnlPct >= 0 ? '+' : ''}${t.pnlPct?.toFixed(2) || '—'}%)</td>
          <td style="color:#6b7280">${t.durationMin || '—'}m</td>
          <td style="color:#6b7280;font-size:11px">${t.reason || '—'}</td>
        </tr>`;
      }).join('');
      document.getElementById('closed-trades').innerHTML = `
        <div class="section-title">Recent Exits</div>
        <table>
          <thead><tr><th>Time (UTC)</th><th>Symbol</th><th>Entry</th><th>Exit</th><th>P&L</th><th>Duration</th><th>Reason</th></tr></thead>
          <tbody>${closedRows}</tbody>
        </table>`;
    } else {
      document.getElementById('closed-trades').innerHTML = '';
    }

    // Performance by symbol
    const symEntries = Object.entries(bySymbol).sort((a, b) => b[1].pnl - a[1].pnl);
    if (symEntries.length > 0) {
      const symRows = symEntries.map(([sym, s]) => {
        const wr = s.trades > 0 ? Math.round(s.wins / s.trades * 100) : 0;
        const avg = s.trades > 0 ? (s.pnl / s.trades).toFixed(2) : '—';
        return `<tr>
          <td><strong>${sym.replace('USDT','')}</strong></td>
          <td class="${s.pnl >= 0 ? 'up' : 'down'}">${s.pnl >= 0 ? '+' : ''}$${s.pnl.toFixed(2)}</td>
          <td>${s.trades}</td>
          <td>${wr}%</td>
          <td class="${s.pnl >= 0 ? 'up' : 'down'}">${s.pnl >= 0 ? '+' : ''}$${avg}</td>
        </tr>`;
      }).join('');
      document.getElementById('perf-symbol').innerHTML = `
        <div class="section-title">Performance by Symbol</div>
        <table>
          <thead><tr><th>Symbol</th><th>Total P&L</th><th>Trades</th><th>Win Rate</th><th>Avg P&L</th></tr></thead>
          <tbody>${symRows}</tbody>
        </table>`;
    } else {
      document.getElementById('perf-symbol').innerHTML = '';
    }

    // Performance by hour
    const hourEntries = Object.entries(byHour).sort((a, b) => a[0].localeCompare(b[0]));
    if (hourEntries.length > 0) {
      const hourRows = hourEntries.map(([hr, h]) => `<tr>
        <td>${hr}:00 UTC</td>
        <td class="${h.pnl >= 0 ? 'up' : 'down'}">${h.pnl >= 0 ? '+' : ''}$${h.pnl.toFixed(2)}</td>
        <td>${h.trades}</td>
      </tr>`).join('');
      document.getElementById('perf-hour').innerHTML = `
        <div class="section-title">Performance by Hour (UTC)</div>
        <table>
          <thead><tr><th>Hour</th><th>P&L</th><th>Trades</th></tr></thead>
          <tbody>${hourRows}</tbody>
        </table>`;
    } else {
      document.getElementById('perf-hour').innerHTML = '';
    }

    // AI insights from self-learning
    try {
      const lr = await fetch('learned-adjustments.json?' + Date.now());
      if (lr.ok) {
        const learned = await lr.json();
        if (learned.recommendations?.length > 0) {
          const items = learned.recommendations.map(r => `<li style="margin-bottom:6px;color:#9ca3af;font-size:13px">💡 ${r}</li>`).join('');
          const excluded = learned.excludedSymbols?.length > 0 ? `<div style="margin-top:12px;font-size:12px;color:#6b7280">Excluded symbols: <span style="color:#ef4444">${learned.excludedSymbols.join(", ")}</span></div>` : '';
          document.getElementById('ai-insights').innerHTML = `
            <div class="section-title">🧠 AI Strategy Insights <span style="font-size:10px;color:#6b7280;font-weight:normal">Updated ${learned.updatedAt?.slice(0,10) || ''}</span></div>
            <div style="background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:16px">
              <ul style="list-style:none;padding:0;margin:0">${items}</ul>
              ${excluded}
            </div>`;
        } else {
          document.getElementById('ai-insights').innerHTML = '';
        }
      }
    } catch { document.getElementById('ai-insights').innerHTML = ''; }

    // Activity log
    const logRows = trades.slice(-50).reverse().map(t => {
      const isStock = t.assetType === 'stock' || (!isCrypto(t.symbol) && t.symbol.length <= 5);
      const icon = isStock ? stockIcon(t.symbol) : coinIcon(t.symbol);
      const label = isStock ? t.symbol : (t.symbol?.replace('USDT','') || '—');
      const isShortEntry = t.side === "sell";
      const badgeClass = !t.orderPlaced ? 'blocked' : isStock ? 'paper-stock' : isShortEntry ? 'paper-short' : 'paper';
      const badgeText = !t.orderPlaced ? 'BLOCKED' : isStock ? 'PAPER STOCK' : isShortEntry ? 'PAPER SHORT' : 'PAPER LONG';
      return `<tr>
        <td style="color:#6b7280">${t.timestamp?.slice(0,19).replace('T',' ') || '—'}</td>
        <td><span class="coin-icon">${icon}</span><strong>${label}</strong></td>
        <td>$${t.price?.toFixed(4) || '—'}</td>
        <td>${t.orderPlaced ? '$' + (t.tradeSize||0).toFixed(2) : '—'}</td>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
      </tr>`;
    }).join('');

    document.getElementById('log').innerHTML = `
      <div class="section-title">Recent Activity</div>
      <table>
        <thead><tr><th>Time (UTC)</th><th>Symbol</th><th>Price</th><th>Size</th><th>Status</th></tr></thead>
        <tbody>${logRows}</tbody>
      </table>`;

    document.getElementById('footer').textContent = `Last updated: ${new Date().toLocaleTimeString()} · Auto-refreshes every 15s`;
  } catch(e) {
    document.getElementById('stats').innerHTML = `<div style="grid-column:1/-1;background:#1a0000;color:#ef4444;padding:16px;border-radius:8px;font-family:monospace;white-space:pre-wrap;font-size:12px">LOAD ERROR: ${e.message}\n\n${e.stack || ''}</div>`;
  }
}

load();
loadMorningReport();
setInterval(load, 15000);
setInterval(loadMorningReport, 60000);
</script>
</body>
</html>
