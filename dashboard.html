<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Claude Bot — Live Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0f1117; color: #d1d5db; font-family: 'Segoe UI', sans-serif; padding: 24px; }
  h1 { color: #fff; font-size: 22px; margin-bottom: 4px; }
  .subtitle { color: #6b7280; font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 28px; }
  .card { background: #1a1d27; border: 1px solid #2d3148; border-radius: 10px; padding: 18px; }
  .card-label { font-size: 11px; color: #6b7280; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; }
  .card-value { font-size: 26px; font-weight: 700; color: #fff; }
  .card-value.green { color: #10b981; }
  .card-value.red { color: #ef4444; }
  .card-value.yellow { color: #f59e0b; }
  .section { margin-bottom: 28px; }
  .section-title { color: #9ca3af; font-size: 12px; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; }
  .section-title .tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
  .tag.crypto { background: #1e3a5f; color: #60a5fa; }
  .tag.stocks { background: #1a3a2a; color: #34d399; }
  table { width: 100%; border-collapse: collapse; background: #1a1d27; border-radius: 10px; overflow: hidden; border: 1px solid #2d3148; }
  th { background: #12141e; color: #6b7280; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; padding: 10px 16px; text-align: left; }
  td { padding: 11px 16px; font-size: 13px; border-top: 1px solid #2d3148; }
  tr:hover td { background: #1f2235; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge.paper { background: #1e3a5f; color: #60a5fa; }
  .badge.paper-short { background: #3a1e2a; color: #f472b6; }
  .badge.paper-stock { background: #1a3a2a; color: #34d399; }
  .badge.blocked { background: #2d1f1f; color: #6b7280; }
  .badge.long { background: #1a3a2a; color: #34d399; }
  .badge.short { background: #3a1e2a; color: #f472b6; }
  .up { color: #10b981; font-weight: 600; }
  .down { color: #ef4444; font-weight: 600; }
  .neutral { color: #6b7280; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #10b981; margin-right: 6px; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .footer { color: #4b5563; font-size: 12px; margin-top: 20px; }
  .coin-icon { font-size: 16px; margin-right: 6px; }
</style>
</head>
<body>
<h1><span class="dot"></span>Claude Trading Bot</h1>
<p class="subtitle">Paper trading · Crypto + Stocks · Updates every 15 seconds</p>

<div id="morning-report" class="section"></div>
<div id="stats" class="grid"></div>
<div id="equity" class="section"></div>
<div id="crypto-positions" class="section"></div>
<div id="stock-positions" class="section"></div>
<div id="closed-trades" class="section"></div>
<div id="perf-symbol" class="section"></div>
<div id="perf-hour" class="section"></div>
<div id="ai-insights" class="section"></div>
<div id="log" class="section"></div>
<p class="footer" id="footer"></p>

<script>
const COIN_ICONS = { BTC:'₿', ETH:'Ξ', SOL:'◎', XRP:'✕', ADA:'₳', DOGE:'Ð', DOT:'●', LINK:'⬡', AVAX:'▲', UNI:'🦄', LTC:'Ł' };
const STOCK_ICONS = { AAPL:'🍎', TSLA:'⚡', NVDA:'🟢', MSFT:'🪟', AMZN:'📦', META:'🔵', GOOGL:'🔍', NFLX:'🎬', SPY:'📊' };
const CRYPTO_SUFFIXES = ['USDT','USD','BTC','ETH'];

function isCrypto(symbol) {
  return CRYPTO_SUFFIXES.some(s => symbol.endsWith(s)) || symbol.length > 5;
}

async function getCryptoPrice(symbol) {
  try {
    const krakenSymbol = symbol.replace('USDT','USD').replace('BTC','XBT');
    const r = await fetch(`https://api.kraken.com/0/public/Ticker?pair=${krakenSymbol}`);
    const d = await r.json();
    if (d.error && d.error.length) return null;
    const key = Object.keys(d.result)[0];
    return parseFloat(d.result[key].c[0]);
  } catch { return null; }
}

async function getStockPrice(ticker) {
  try {
    // Yahoo Finance public quote endpoint
    const r = await fetch(`https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1m&range=1d`);
    const d = await r.json();
    const meta = d.chart?.result?.[0]?.meta;
    return meta?.regularMarketPrice || meta?.previousClose || null;
  } catch { return null; }
}

function coinIcon(symbol) {
  const coin = symbol.replace('USDT','').replace('USD','');
  return COIN_ICONS[coin] || '●';
}

function stockIcon(ticker) {
  return STOCK_ICONS[ticker] || '📈';
}

async function loadMorningReport() {
  try {
    const r = await fetch('morning-report.json?' + Date.now());
    if (!r.ok) { document.getElementById('morning-report').innerHTML = ''; return; }
    const report = await r.json();
    const sentimentColor = report.marketSentiment === 'bullish' ? '#10b981' : report.marketSentiment === 'bearish' ? '#ef4444' : '#f59e0b';
    const sentimentIcon = report.marketSentiment === 'bullish' ? '📈' : report.marketSentiment === 'bearish' ? '📉' : '➖';
    const headlines = (report.topHeadlines || []).map(h => `<li style="margin-bottom:4px;color:#9ca3af">${h}</li>`).join('');
    const pnlColor = report.yesterdayPnl >= 0 ? '#10b981' : '#ef4444';
    document.getElementById('morning-report').innerHTML = `
      <div class="section-title">☀️ Morning Report — ${report.date}</div>
      <div style="background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:20px">
        <div>
          <div style="font-size:12px;color:#6b7280;margin-bottom:8px">MARKET SENTIMENT</div>
          <div style="font-size:22px;font-weight:700;color:${sentimentColor}">${sentimentIcon} ${report.marketSentiment.toUpperCase()}</div>
          <div style="margin-top:16px;font-size:12px;color:#6b7280;margin-bottom:8px">YESTERDAY P&L</div>
          <div style="font-size:20px;font-weight:700;color:${pnlColor}">${report.yesterdayPnl >= 0 ? '+' : ''}$${report.yesterdayPnl.toFixed(2)}</div>
          <div style="margin-top:16px;font-size:12px;color:#6b7280;margin-bottom:4px">OVERNIGHT TRADES: ${report.overnightTrades} &nbsp;|&nbsp; OPEN POSITIONS: ${report.openPositions}</div>
          ${report.bestSymbol ? `<div style="margin-top:8px;font-size:12px;color:#6b7280">Best: <span style="color:#10b981">${report.bestSymbol.symbol} +$${report.bestSymbol.pnl.toFixed(2)}</span></div>` : ''}
          ${report.worstSymbol ? `<div style="font-size:12px;color:#6b7280">Worst: <span style="color:#ef4444">${report.worstSymbol.symbol} $${report.worstSymbol.pnl.toFixed(2)}</span></div>` : ''}
        </div>
        <div>
          <div style="font-size:12px;color:#6b7280;margin-bottom:8px">TOP HEADLINES (LAST 8H)</div>
          <ul style="list-style:none;padding:0;font-size:12px">${headlines || '<li style="color:#6b7280">No headlines found</li>'}</ul>
        </div>
      </div>`;
  } catch { document.getElementById('morning-report').innerHTML = ''; }
}

async function load() {
  try {
    const r = await fetch('trades-data.json?' + Date.now());
    const raw = await r.json();
    const trades = Array.isArray(raw) ? raw : (raw.trades || []);
    const openPositions = raw.openPositions || [];
    const serverStats = raw.stats || {};
    const executed = trades.filter(t => t.orderPlaced);
    const today = new Date().toISOString().slice(0,10);
    const todayTrades = executed.filter(t => t.timestamp.startsWith(today));

    // Build open positions from positions.json data
    const cryptoOpen = openPositions.filter(p => isCrypto(p.symbol));
    const stockOpen = openPositions.filter(p => !isCrypto(p.symbol));

    // Fetch live prices for open positions only
    const cryptoSymbols = [...new Set(cryptoOpen.map(p => p.symbol))];
    const stockSymbols = [...new Set(stockOpen.map(p => p.symbol))];

    const [cryptoPrices, stockPrices] = await Promise.all([
      Promise.all(cryptoSymbols.map(s => getCryptoPrice(s))),
      Promise.all(stockSymbols.map(s => getStockPrice(s))),
    ]);

    const priceMap = {};
    cryptoSymbols.forEach((s, i) => priceMap[s] = cryptoPrices[i]);
    stockSymbols.forEach((s, i) => priceMap[s] = stockPrices[i]);

    // Unrealised P&L on open positions
    let totalPnl = 0, totalInvested = 0;
    openPositions.forEach(pos => {
      const currentPrice = priceMap[pos.symbol];
      if (currentPrice) totalPnl += (currentPrice - pos.entryPrice) * pos.quantity;
      totalInvested += pos.sizeUSD;
    });

    const todayPnl = serverStats.todayPnl || 0;
    const maxDrawdown = serverStats.maxDrawdown || 0;
    const sharpe = serverStats.sharpe;
    const bySymbol = serverStats.bySymbol || {};
    const byHour = serverStats.byHour || {};

    // Win rate from bySymbol totals
    const totalTrades = Object.values(bySymbol).reduce((s, v) => s + v.trades, 0);
    const totalWins = Object.values(bySymbol).reduce((s, v) => s + v.wins, 0);
    const winRate = totalTrades > 0 ? Math.round(totalWins / totalTrades * 100) : null;

    // Stats cards
    document.getElementById('stats').innerHTML = `
      <div class="card">
        <div class="card-label">Unrealised P&L</div>
        <div class="card-value ${totalPnl >= 0 ? 'green' : 'red'}">${totalPnl >= 0 ? '+' : ''}$${totalPnl.toFixed(2)}</div>
      </div>
      <div class="card">
        <div class="card-label">Today's Realised P&L</div>
        <div class="card-value ${todayPnl >= 0 ? 'green' : 'red'}">${todayPnl >= 0 ? '+' : ''}$${todayPnl.toFixed(2)}</div>
      </div>
      <div class="card">
        <div class="card-label">Win Rate</div>
        <div class="card-value ${winRate >= 50 ? 'green' : winRate !== null ? 'red' : ''}">${winRate !== null ? winRate + '%' : '—'}</div>
      </div>
      <div class="card">
        <div class="card-label">Max Drawdown</div>
        <div class="card-value red">${maxDrawdown > 0 ? '-$' + maxDrawdown.toFixed(2) : '—'}</div>
      </div>
      <div class="card">
        <div class="card-label">Sharpe Ratio</div>
        <div class="card-value ${sharpe > 1 ? 'green' : sharpe !== null ? 'yellow' : ''}">${sharpe !== null ? sharpe : '—'}</div>
      </div>
      <div class="card">
        <div class="card-label">Open Positions</div>
        <div class="card-value yellow">${openPositions.length}</div>
      </div>
    `;

    // Equity curve from daily P&L
    const dailyPnl = serverStats.dailyPnl || {};
    const days = Object.keys(dailyPnl).sort();
    if (days.length > 1) {
      let running = 0;
      const points = days.map(d => { running += dailyPnl[d]; return { d, v: running }; });
      const min = Math.min(...points.map(p => p.v));
      const max = Math.max(...points.map(p => p.v));
      const range = max - min || 1;
      const W = 600, H = 80;
      const toX = i => Math.round((i / (points.length - 1)) * W);
      const toY = v => Math.round(H - ((v - min) / range) * H);
      const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'}${toX(i)},${toY(p.v)}`).join(' ');
      const lastColor = points[points.length-1].v >= 0 ? '#10b981' : '#ef4444';
      document.getElementById('equity').innerHTML = `
        <div class="section-title">Equity Curve</div>
        <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:80px;background:#1a1d27;border-radius:8px;border:1px solid #2d3148">
          <line x1="0" y1="${toY(0)}" x2="${W}" y2="${toY(0)}" stroke="#2d3148" stroke-width="1" stroke-dasharray="4"/>
          <path d="${path}" fill="none" stroke="${lastColor}" stroke-width="2"/>
        </svg>`;
    } else {
      document.getElementById('equity').innerHTML = '';
    }

    // Open positions table
    function posRow(pos, icon, label) {
      const isShort = pos.side === "sell";
      const currentPrice = priceMap[pos.symbol];
      const pnl = currentPrice
        ? (isShort ? (pos.entryPrice - currentPrice) : (currentPrice - pos.entryPrice)) * pos.quantity
        : null;
      const pnlPct = pnl !== null ? (pnl / pos.sizeUSD * 100) : null;
      const pnlClass = pnl === null ? 'neutral' : pnl >= 0 ? 'up' : 'down';
      const pnlStr = pnl === null ? '—' : `${pnl >= 0 ? '+' : ''}$${pnl.toFixed(2)} (${pnl >= 0 ? '+' : ''}${pnlPct.toFixed(2)}%)`;
      const trailLevel = isShort ? pos.lowestPrice : pos.highestPrice;
      const trailStop = trailLevel
        ? (isShort ? (trailLevel * 1.003).toFixed(2) : (trailLevel * 0.997).toFixed(2))
        : '—';
      const dirBadge = isShort
        ? `<span class="badge short">SHORT</span>`
        : `<span class="badge long">LONG</span>`;
      return `<tr>
        <td><span class="coin-icon">${icon}</span><strong>${label}</strong> ${dirBadge}</td>
        <td>$${pos.entryPrice.toFixed(4)}</td>
        <td>${currentPrice ? '$' + currentPrice.toFixed(4) : '—'}</td>
        <td>$${pos.sizeUSD.toFixed(2)}</td>
        <td class="${pnlClass}">${pnlStr}</td>
        <td style="color:#6b7280">$${trailStop}</td>
      </tr>`;
    }

    const cryptoRows = cryptoOpen.map(pos => posRow(pos, coinIcon(pos.symbol), pos.symbol.replace('USDT',''))).join('');
    document.getElementById('crypto-positions').innerHTML = `
      <div class="section-title">Crypto Positions <span class="tag crypto">CRYPTO</span></div>
      <table>
        <thead><tr><th>Coin</th><th>Entry</th><th>Current Price</th><th>Size</th><th>P&L</th><th>Trail Stop</th></tr></thead>
        <tbody>${cryptoRows || '<tr><td colspan="6" style="color:#6b7280;text-align:center">No open crypto positions</td></tr>'}</tbody>
      </table>`;

    const stockRows = stockOpen.map(pos => posRow(pos, stockIcon(pos.symbol), pos.symbol)).join('');
    document.getElementById('stock-positions').innerHTML = `
      <div class="section-title">Stock Positions <span class="tag stocks">STOCKS</span></div>
      <table>
        <thead><tr><th>Ticker</th><th>Entry</th><th>Current Price</th><th>Size</th><th>P&L</th><th>Trail Stop</th></tr></thead>
        <tbody>${stockRows || '<tr><td colspan="6" style="color:#6b7280;text-align:center">No open stock positions</td></tr>'}</tbody>
      </table>`;

    // Closed trades
    const closedTrades = (raw.closedTrades || []).slice().reverse();
    if (closedTrades.length > 0) {
      const closedRows = closedTrades.slice(0, 20).map(t => {
        const isShort = t.side === "short";
        const dirBadge = isShort
          ? `<span class="badge short">SHORT</span>`
          : `<span class="badge long">LONG</span>`;
        const pnlClass = t.pnlUSD >= 0 ? 'up' : 'down';
        return `<tr>
          <td style="color:#6b7280">${t.time?.slice(0,16).replace('T',' ') || '—'}</td>
          <td><strong>${t.symbol?.replace('USDT','') || '—'}</strong> ${dirBadge}</td>
          <td>$${t.entryPrice?.toFixed(2) || '—'}</td>
          <td>$${t.exitPrice?.toFixed(2) || '—'}</td>
          <td class="${pnlClass}">${t.pnlUSD >= 0 ? '+' : ''}$${t.pnlUSD?.toFixed(2) || '—'} (${t.pnlPct >= 0 ? '+' : ''}${t.pnlPct?.toFixed(2) || '—'}%)</td>
          <td style="color:#6b7280">${t.durationMin || '—'}m</td>
          <td style="color:#6b7280;font-size:11px">${t.reason || '—'}</td>
        </tr>`;
      }).join('');
      document.getElementById('closed-trades').innerHTML = `
        <div class="section-title">Recent Exits</div>
        <table>
          <thead><tr><th>Time (UTC)</th><th>Symbol</th><th>Entry</th><th>Exit</th><th>P&L</th><th>Duration</th><th>Reason</th></tr></thead>
          <tbody>${closedRows}</tbody>
        </table>`;
    } else {
      document.getElementById('closed-trades').innerHTML = '';
    }

    // Performance by symbol
    const symEntries = Object.entries(bySymbol).sort((a, b) => b[1].pnl - a[1].pnl);
    if (symEntries.length > 0) {
      const symRows = symEntries.map(([sym, s]) => {
        const wr = s.trades > 0 ? Math.round(s.wins / s.trades * 100) : 0;
        const avg = s.trades > 0 ? (s.pnl / s.trades).toFixed(2) : '—';
        return `<tr>
          <td><strong>${sym.replace('USDT','')}</strong></td>
          <td class="${s.pnl >= 0 ? 'up' : 'down'}">${s.pnl >= 0 ? '+' : ''}$${s.pnl.toFixed(2)}</td>
          <td>${s.trades}</td>
          <td>${wr}%</td>
          <td class="${s.pnl >= 0 ? 'up' : 'down'}">${s.pnl >= 0 ? '+' : ''}$${avg}</td>
        </tr>`;
      }).join('');
      document.getElementById('perf-symbol').innerHTML = `
        <div class="section-title">Performance by Symbol</div>
        <table>
          <thead><tr><th>Symbol</th><th>Total P&L</th><th>Trades</th><th>Win Rate</th><th>Avg P&L</th></tr></thead>
          <tbody>${symRows}</tbody>
        </table>`;
    } else {
      document.getElementById('perf-symbol').innerHTML = '';
    }

    // Performance by hour
    const hourEntries = Object.entries(byHour).sort((a, b) => a[0].localeCompare(b[0]));
    if (hourEntries.length > 0) {
      const hourRows = hourEntries.map(([hr, h]) => `<tr>
        <td>${hr}:00 UTC</td>
        <td class="${h.pnl >= 0 ? 'up' : 'down'}">${h.pnl >= 0 ? '+' : ''}$${h.pnl.toFixed(2)}</td>
        <td>${h.trades}</td>
      </tr>`).join('');
      document.getElementById('perf-hour').innerHTML = `
        <div class="section-title">Performance by Hour (UTC)</div>
        <table>
          <thead><tr><th>Hour</th><th>P&L</th><th>Trades</th></tr></thead>
          <tbody>${hourRows}</tbody>
        </table>`;
    } else {
      document.getElementById('perf-hour').innerHTML = '';
    }

    // AI insights from self-learning
    try {
      const lr = await fetch('learned-adjustments.json?' + Date.now());
      if (lr.ok) {
        const learned = await lr.json();
        if (learned.recommendations?.length > 0) {
          const items = learned.recommendations.map(r => `<li style="margin-bottom:6px;color:#9ca3af;font-size:13px">💡 ${r}</li>`).join('');
          const excluded = learned.excludedSymbols?.length > 0 ? `<div style="margin-top:12px;font-size:12px;color:#6b7280">Excluded symbols: <span style="color:#ef4444">${learned.excludedSymbols.join(", ")}</span></div>` : '';
          document.getElementById('ai-insights').innerHTML = `
            <div class="section-title">🧠 AI Strategy Insights <span style="font-size:10px;color:#6b7280;font-weight:normal">Updated ${learned.updatedAt?.slice(0,10) || ''}</span></div>
            <div style="background:#1a1d27;border:1px solid #2d3148;border-radius:10px;padding:16px">
              <ul style="list-style:none;padding:0;margin:0">${items}</ul>
              ${excluded}
            </div>`;
        } else {
          document.getElementById('ai-insights').innerHTML = '';
        }
      }
    } catch { document.getElementById('ai-insights').innerHTML = ''; }

    // Activity log
    const logRows = trades.slice(-50).reverse().map(t => {
      const isStock = t.assetType === 'stock' || (!isCrypto(t.symbol) && t.symbol.length <= 5);
      const icon = isStock ? stockIcon(t.symbol) : coinIcon(t.symbol);
      const label = isStock ? t.symbol : (t.symbol?.replace('USDT','') || '—');
      const isShortEntry = t.side === "sell";
      const badgeClass = !t.orderPlaced ? 'blocked' : isStock ? 'paper-stock' : isShortEntry ? 'paper-short' : 'paper';
      const badgeText = !t.orderPlaced ? 'BLOCKED' : isStock ? 'PAPER STOCK' : isShortEntry ? 'PAPER SHORT' : 'PAPER LONG';
      return `<tr>
        <td style="color:#6b7280">${t.timestamp?.slice(0,19).replace('T',' ') || '—'}</td>
        <td><span class="coin-icon">${icon}</span><strong>${label}</strong></td>
        <td>$${t.price?.toFixed(4) || '—'}</td>
        <td>${t.orderPlaced ? '$' + (t.tradeSize||0).toFixed(2) : '—'}</td>
        <td><span class="badge ${badgeClass}">${badgeText}</span></td>
      </tr>`;
    }).join('');

    document.getElementById('log').innerHTML = `
      <div class="section-title">Recent Activity</div>
      <table>
        <thead><tr><th>Time (UTC)</th><th>Symbol</th><th>Price</th><th>Size</th><th>Status</th></tr></thead>
        <tbody>${logRows}</tbody>
      </table>`;

    document.getElementById('footer').textContent = `Last updated: ${new Date().toLocaleTimeString()} · Auto-refreshes every 15s`;
  } catch(e) {
    document.getElementById('stats').innerHTML = `<p style="color:#ef4444">Error loading data: ${e.message}</p>`;
  }
}

load();
loadMorningReport();
setInterval(load, 15000);
setInterval(loadMorningReport, 60000);
</script>
</body>
</html>
